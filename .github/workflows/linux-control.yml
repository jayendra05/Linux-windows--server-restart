name: Linux Server Control

on:
  workflow_dispatch:
    inputs:
      server:
        description: "Select Server"
        required: true
        type: choice
        options:
          - linux1

      action:
        description: "Select Action"
        required: true
        type: choice
        options:
          - start
          - stop
          - restart

jobs:
  control:
    runs-on: ubuntu-latest

    steps:
      - name: Set Host
        run: |
          echo "HOST=${{ secrets.LINUX1_HOST }}" >> $GITHUB_ENV

      - name: Connect and Test
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=================================="
            echo "Selected Server : ${{ github.event.inputs.server }}"
            echo "Selected Action : ${{ github.event.inputs.action }}"
            echo "=================================="

            echo "Hostname:"
            hostname

            echo "Current User:"
            whoami

            echo "Uptime:"
            uptime

            echo "OS Details:"
            cat /etc/os-release || uname -a

            echo "Running Services:"
            systemctl list-units --type=service --state=running --no-pager | head -20