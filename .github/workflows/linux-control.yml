name: Linux Server Control

on:
  workflow_dispatch:
    inputs:
      server:
        description: "Select Server"
        required: true
        type: choice
        options:
          - linux1

      action:
        description: "Select Action"
        required: true
        type: choice
        options:
          - start
          - stop
          - restart

jobs:
  control:
    runs-on: ubuntu-latest

    steps:
      - name: Set Server Details
        run: |
          echo "HOST=${{ secrets.LINUX1_HOST }}" >> $GITHUB_ENV

      - name: Execute Action
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Server: ${{ github.event.inputs.server }}"
            echo "Action: ${{ github.event.inputs.action }}"

            sudo systemctl ${{ github.event.inputs.action }} nginx